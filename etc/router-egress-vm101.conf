# schema=router-egress-vm101-v1
# STEP_050M07R15A_LEGACY_EXECUTION_FREEZE_AND_CLEAN_FOUNDATION

STATE_DIR=/var/lib/router-egress-recovery
SLOTS_CONF=/etc/router-egress-slots.d/slots.conf

LOCAL_REPAIR_ENABLED=1
LOCAL_REPAIR_MODE=--commit
HEALTH_CHECK_INTERVAL_SEC=60
HEALTH_FAILURES_BEFORE_DOWN=2
LOCAL_REPAIR_COOLDOWN_SEC=900
LOCAL_REPAIR_CANDIDATE_RETRIES=3
LOCAL_REPAIR_RETEST_COUNT=3

FULL_REFRESH_AFTER_REPAIRS=5
FULL_POOL_REFRESH_ENABLED=true
HMN_REFRESH_RETRY_INTERVAL_SEC=1800
HMN_REFRESH_RETRY_TICK_SEC=60
FULL_POOL_REFRESH_ORCHESTRATOR=/usr/local/sbin/router-egress-full-pool-refresh.sh
FULL_POOL_REFRESH_AUTOMATIC_RETRY=true
FULL_POOL_REFRESH_RETRY_CONTROLLER=/usr/local/sbin/router-egress-full-pool-refresh-retry.sh
FULL_POOL_REFRESH_RETRY_SERVICE=/etc/init.d/router-egress-full-pool-refresh-retry
FULL_POOL_REFRESH_RETRY_LOG=/var/log/router-egress-full-pool-refresh-retry.log
RECOVERY_PERSIST_STATE_KV=/etc/router-egress-recovery/state.kv
CANDIDATE_TEST_TIMEOUT_SEC=3
CANDIDATE_TEST_RETRIES=3
POOL_SIZE=5

BOOTSTRAP_SLOT=egress1
BOOTSTRAP_RETRY_INTERVAL_SEC=300
BOOTSTRAP_CANDIDATE_RETRY_COUNT=3
BOOTSTRAP_STRATEGY_ORDER="healthy_slot provider_download cached_pool"
MIN_HEALTHY_SLOTS_TO_EXIT_DIRECT=3
DIRECT_FAILOPEN_ENABLED=false

LEGACY_EXECUTION_ALLOWED=false
PROVIDER_ROOT=/root/hmn
PROVIDER_DOWNLOAD_CMD=/root/hmn/hmn-download-all-awg.sh
PROVIDER_TEST_CMD=/root/hmn/hmn-test-all-awg.sh
PROVIDER_RANK_CMD=/root/hmn/hmn-rank-awg.sh
PROVIDER_TEST_INTERFACE=vpn_test

RECOVERY_STATE_HELPER=/usr/local/lib/router-egress-recovery-state.sh
RECOVERY_DISPATCHER=/usr/local/sbin/router-egress-recovery-dispatcher.sh
RECOVERY_LOG=/var/log/router-egress-recovery-hmn.log
HEALTH_REPAIR_LOG=/var/log/router-egress-health-repair.log
